<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)"/>
  
  <!-- Inner Circle -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.5"/>
  
  <!-- Astronaut Helmet -->
  <ellipse cx="100" cy="95" rx="45" ry="50" fill="#FFFFFF" opacity="0.95"/>
  <ellipse cx="100" cy="90" rx="38" ry="42" fill="#1E3A5F" opacity="0.9"/>
  
  <!-- Visor Reflection -->
  <ellipse cx="100" cy="88" rx="35" ry="38" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>
  
  <!-- Space Suit Body -->
  <path d="M55 140 Q100 130 145 140 L140 170 Q100 175 60 170 Z" fill="#FFFFFF" opacity="0.9"/>
  <path d="M70 155 L130 155" stroke="#D4AF37" stroke-width="2"/>
  <circle cx="85" cy="155" r="5" fill="#D4AF37"/>
  <circle cx="115" cy="155" r="5" fill="#1E3A5F"/>
  
  <!-- Antenna on Helmet -->
  <line x1="130" y1="60" x2="145" y2="40" stroke="#D4AF37" stroke-width="3" stroke-linecap="round"/>
  <circle cx="148" cy="38" r="5" fill="#D4AF37"/>
  
  <!-- Small Star -->
  <polygon points="35,45 37,50 42,50 38,54 40,60 35,56 30,60 32,54 28,50 33,50" fill="#D4AF37"/>
  
  <!-- Another Star -->
  <polygon points="160,70 161,73 164,73 162,75 163,78 160,76 157,78 158,75 156,73 159,73" fill="#FFFFFF" opacity="0.7"/>
</svg>
